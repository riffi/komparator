docType: ui-spec
format_version: 0.0.3
metadata:
  name: komparator
  description: Side-by-side comparison tool for LLM-generated HTML outputs. Users create experiments with prompts, copy them into different LLMs with a built-in HTML-output instruction and an optional wrapper, paste back HTML results, rate them 1-10, and compare visually.
  theme: dark minimal interface, monospace accents for code/prompt areas, clean data-dense layout optimized for technical users
  background: solid dark neutral background
  palette:
    primary: muted blue — actions, links, active states
    surface: elevated dark cards with subtle border
    surface-code: darker inset background for code/prompt/HTML areas
    accent-provider: "each LLM provider gets a distinct color (Anthropic: coral, OpenAI: green, Google: blue, Meta: purple, xAI: neutral)"
    rating-scale: gradient from red (1) through yellow (5) to green (10)
  breakpoints:
    mobile: < 768px
    tablet: 768px - 1279px
    desktop: ">= 1280px"
templates:
  app_shell:
    purpose: Main application shell with collapsible sidebar and top bar
    regions:
      - id: topbar
        type: static
        position: top
        purpose: Narrow top bar with app identity and global actions
        blocks:
          - id: logo
            purpose: Komparator logo/wordmark (left). Monospace or geometric sans font.
            type: logo
          - id: global_actions
            purpose: "Right side: Export/Import ZIP backup buttons for the full local database, settings gear icon, theme toggle (dark/light)."
            type: custom
        fixed: true
      - id: sidebar
        type: static
        position: left
        purpose: Navigation sidebar, collapsible to icon-only on tablet, hidden on mobile (hamburger in topbar)
        blocks:
          - id: main_nav
            purpose: Primary navigation links with icons
            type: main_navigation
        fullHeight: true
      - id: main
        type: content
        position: center
default_template: app_shell
navigation:
  items:
    - id: nav_experiments
      label: Experiments
      target: experiments_list
    - id: nav_models
      label: Models
      target: models_list
    - id: nav_wrappers
      label: Wrappers
      target: wrappers_list
    - id: nav_stats
      label: Stats
      target: stats_dashboard
screen_groups:
  - id: experiments
    screens:
      - experiments_list
      - experiment_detail
  - id: reference_data
    screens:
      - models_list
      - model_form
      - wrappers_list
      - wrapper_form
  - id: analytics
    screens:
      - stats_dashboard
screens:
  experiments_list:
    blocks:
      - id: list_header
        purpose: "Compact toolbar row: page title 'Experiments' with count, view mode segmented control (All | By category), title-only search input, sort dropdown, 'Categories' button for inline category management, and 'New experiment' primary button. The new-experiment action opens a lightweight create-only modal; there is no separate edit-experiment screen because experiment and prompt changes are handled inside 'Prompt & settings' on experiment_detail."
        columns: 12
      - id: categories_manager
        purpose: "Modal opened from the toolbar on the experiments page. Lists categories with color, description and experiment count. Supports create, rename, recolor and delete. Delete is disabled when the category is still used by experiments."
        columns: 12
      - id: experiments_grid
        purpose: "Content area with two modes. 'All' mode shows one responsive grid of experiment cards. 'By category' mode shows category sections with colored headers and per-category responsive grids. If there are no experiments yet, the content area switches to a dedicated onboarding empty state with a short explanation of what experiments are, how the workflow works, and a primary action to create the first experiment."
        columns: 12
        blocks:
          - id: experiment_card
            purpose: "Repeated card per experiment. Shows: title (bold, clickable → experiment_detail), description (2 lines truncated), category badge (colored dot + name), stats row (number of prompt versions, number of results, avg rating as colored number). Bottom: created date and last updated relative time. Hover: subtle elevation. Click anywhere → experiment_detail."
    title: Experiments
    purpose: Main screen. Browse experiments either as one list or grouped into category sections.
  experiment_detail:
    blocks:
      - id: experiment_topbar
        purpose: "Compact informational header above the main workspace block: experiment title (bold, left), category badge and description. This row sits outside the bordered results/settings container and does not duplicate prompt-copying or editing actions that already exist deeper in the workflow."
        columns: 12
      - id: experiment_tabs
        purpose: "Tab bar with two tabs: 'Results' (shows count badge with number of results) and 'Prompt & settings'. Results tab active by default. Right side of tab bar (visible only on Results tab): view mode toggle (Single | Side by side), prompt version dropdown (v1/v2/v3), '+ Add result' primary button."
        columns: 12
      - id: add_result_modal
        purpose: "Modal flow for attaching a result to the current prompt version. The content is organized as three explicit steps on one screen. Step 1: compact prompt block with version, wrapper, copy action and final clipboard prompt preview. The copied prompt always includes a built-in instruction to return exactly one HTML page and no explanation outside it; external assets and CDNs are allowed. Wrapper is optional and, when present, wraps that final prompt. Step 2: chosen model summary with a 'Choose model' action opening a dedicated chooser modal. Step 3: large HTML output textarea. Optional notes stay collapsed by default below the HTML field. Rating is not collected at this stage; it is set later while reviewing the rendered result."
        columns: 12
      - id: add_result_model_manager
        purpose: "Nested modal opened from Add result. Left side: model catalog list with search by model/provider text and provider filter dropdown. User can choose an existing model from the list. Each model row also exposes quick actions for edit and duplicate without leaving the modal. Right side: shared model editor used for create, edit and duplicate flows (existing or new provider, model name, version, comment, active state). Newly created or updated model becomes immediately selectable for the pending result."
        columns: 12
      - id: results_tab
        purpose: "Main workspace tab. Fills the remaining viewport height as a fixed workspace. Master-detail layout: narrow list on left, large preview on right. The page itself should not grow with long result content; scrolling happens inside the results list panel and inside the preview/code panels."
        columns: 12
        blocks:
          - id: results_list
            purpose: "Left panel: scrollable list of results for selected prompt version. Each item shows: provider color dot, model name (bold), version + comment on second line (muted), rating number (colored by rating-scale palette), attempt badge (if >1). Each row also has a compact overflow action button opening a menu with 'Edit' and 'Delete'. Edit opens a modal for changing the saved HTML output and notes. Delete opens a confirmation modal. Selected item highlighted with left border accent. Click selects result for preview. In side-by-side mode: click assigns to slot A or B (visually marked with A/B labels and distinct left-border colors). Sort control at top is functional and supports rating / model / date. If the selected prompt version has no results yet, the panel shows a compact empty state instead of an empty list. If the list exceeds the available height, the panel itself scrolls."
            columns:
              default: 3
              mobile: 12
              tablet: 4
          - id: results_preview_single
            purpose: "Right panel: full preview of selected result. Single compact header combines provider dot + full model name (provider / name / version), compact rating control, comment, file size and line count. The same header also contains local preview controls: device width switcher with user-facing labels 'Mobile' / 'Tablet' / 'Desktop' (internally 375px / 768px / 100%), 'Fullscreen', and a compact overflow menu '...' with 'Code' and 'Notes'. 'Fullscreen' opens an overlay with the same current preview state (single or compare, current device width, current code mode) and closes via close button or Escape. In single-result fullscreen mode, fast result switching is available directly in the header via previous/next controls next to the model title, plus a compact attempt badge. Main area: sandboxed iframe (srcdoc) rendering the HTML result, takes all available height. If there are no results for the selected prompt version, the preview area is replaced by a dedicated empty state with 'Copy prompt' and '+ Add result' actions. If rendered HTML or code exceeds the available height, scrolling stays inside the preview area."
            columns:
              default: 9
              mobile: 12
              tablet: 8
          - id: results_preview_sbs
            purpose: "Right panel splits into two resizable sub-panels (A and B), separated by a draggable divider. Each sub-panel has a compact header with provider dot, model name, attempt metadata and rating. Below: sandboxed iframe rendering HTML or code view depending on the shared compare-mode state. Both panels share the same device width simulator (synced) with user-facing labels 'Mobile' / 'Tablet' / 'Desktop'. Selecting results from the list assigns them to A (first click) then B (second click). Click again on a listed item to swap it into the most recently active slot. Each sub-panel keeps its own internal scroll when content exceeds the available height."
            columns:
              default: 9
              mobile: 12
              tablet: 8
      - id: prompt_settings_tab
        purpose: Secondary tab (hidden by default). Contains all prompt and experiment configuration. Rarely accessed — user comes here to edit prompt text or change settings, then returns to Results.
        columns: 12
        blocks:
          - id: prompt_versions
            purpose: "Prompt version selector: horizontal pills (v1, v2, v3...) with '+ New version' button at end. Active version highlighted."
            columns: 12
          - id: prompt_editor
            purpose: "Selected version: prompt text in editable monospace editor with a line-number gutter (surface-code background). Below: change_note (italic, muted text — what changed from previous version). Save changes button is enabled only when something changed."
            columns: 12
          - id: experiment_settings
            purpose: "Collapsible settings section: title, description (editable textarea), wrapper selector (dropdown with 'No wrapper' option, shows the final clipboard prompt with the built-in HTML instruction when wrapper is not selected and the wrapped final prompt preview otherwise), category selector (dropdown with optional empty state / 'No category'). Experiment created/updated dates plus prompt version created date are shown as read-only fields."
            columns: 12
    title: Experiment Detail
    purpose: "Central workspace for one experiment. Two tabs: Results (default, primary workspace) and Prompt & settings (rare editing). Results tab has list+preview layout with single/side-by-side modes."
  models_list:
    blocks:
      - id: models_header
        purpose: Page title 'Models', search input, 'Add provider' button, 'Add model' primary button.
        columns: 12
      - id: providers_section
        purpose: "Providers displayed as a horizontal row of editable chips/cards. Each: provider color dot, name, model count badge. Click to filter models below. Separate provider cards below allow quick editing of name, color and active state."
        columns: 12
      - id: models_table
        purpose: "Table of models. Columns: provider (color dot + name), model name, version, comment/config, is_active toggle, results count (how many times used), avg rating across all results. Row actions: edit (opens model_form), duplicate (pre-fills form), deactivate toggle. Sortable by the visible columns and filterable by provider (via chips above)."
        columns: 12
    title: Models
    purpose: Manage LLM providers and models catalog.
  model_form:
    blocks:
      - id: model_form_content
        purpose: "Form fields: provider (select from existing or create new inline with color picker), model name (text input with autocomplete from existing names), version (text input), comment (textarea, placeholder hints: 'thinking high, temp 0.7, etc.'), is_active toggle."
        columns: 12
      - id: model_form_footer
        purpose: Cancel and Save buttons.
        columns: 12
    title: New / Edit Model
    purpose: Modal dialog for creating or editing a model configuration.
  wrappers_list:
    blocks:
      - id: wrappers_header
        purpose: Page title 'Wrappers', 'Add wrapper' primary button.
        columns: 12
      - id: wrappers_grid
        purpose: "Grid of wrapper cards. Each: name (bold), 'default' badge if is_default, template text preview (first 3 lines, monospace, surface-code background), usage count (how many experiments use it), updated date. Click → wrapper_form. Actions: duplicate, set as default, delete (with check if used by experiments). If there are no wrappers yet, the grid area switches to a styled onboarding empty state that explains what wrappers are, how {{prompt}} works, and how wrappers are attached to experiments before comparison."
        columns: 12
    title: Wrappers
    purpose: Manage prompt wrapper templates.
  wrapper_form:
    blocks:
      - id: wrapper_editor
        purpose: "Left panel: name input (top), template textarea (monospace, large, surface-code background, line numbers). Must contain {{prompt}} placeholder — show validation warning if missing. is_default toggle below."
        columns:
          default: 6
          mobile: 12
      - id: wrapper_preview
        purpose: "Right panel: live preview showing how the wrapper will look with a sample prompt substituted into {{prompt}}. Sample prompt is editable. Rendered in monospace, surface-code background. Shows total character count."
        columns:
          default: 6
          mobile: 12
      - id: wrapper_form_footer
        purpose: Cancel and Save buttons.
        columns: 12
    title: New / Edit Wrapper
    purpose: Full-screen or large modal for editing wrapper template with live preview.
  stats_dashboard:
    blocks:
      - id: stats_summary
        purpose: "Top row of metric cards: total experiments, total results, total models used, average rating across all results. Each card shows number + trend indicator."
        columns: 12
      - id: model_leaderboard
        purpose: "Leaderboard table: models ranked by average rating. Columns: rank, provider color dot + model name + version, avg rating (colored), number of results rated, win rate (% of times this model had highest rating in an experiment). Sortable."
        columns:
          default: 6
          mobile: 12
      - id: provider_breakdown
        purpose: "Bar chart or horizontal stacked bars: rating distribution per provider. X-axis: providers. Y-axis: average rating. Color-coded by provider palette. Shows how many results each provider has."
        columns:
          default: 6
          mobile: 12
      - id: category_stats
        purpose: "Table: categories with avg rating per model. Rows: categories. Columns: each active model. Cells: avg rating (colored). Shows which model excels in which category of tasks."
        columns:
          default: 6
          mobile: 12
      - id: rating_history
        purpose: "Line chart: average rating over time per model. X-axis: date (experiments created_at). Y-axis: rating 1-10. One line per model (colored by provider). Shows trends — which models are improving/degrading over time."
        columns:
          default: 6
          mobile: 12
    title: Stats
    purpose: Aggregated statistics across all experiments, models, and ratings.

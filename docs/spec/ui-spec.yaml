docType: ui-spec
format_version: 0.0.3
metadata:
  name: komparator
  description: Side-by-side comparison tool for LLM-generated HTML outputs. Users create experiments with prompts, copy them into different LLMs with a built-in HTML-output instruction and an optional wrapper, paste back HTML results, rate them 1-10, and compare visually.
  theme: dark minimal interface, monospace accents for code/prompt areas, clean data-dense layout optimized for technical users
  background: solid dark neutral background
  palette:
    primary: muted blue — actions, links, active states
    surface: elevated dark cards with subtle border
    surface-code: darker inset background for code/prompt/HTML areas
    accent-provider: "each LLM provider gets a distinct color (Anthropic: coral, OpenAI: green, Google: blue, Meta: purple, xAI: neutral)"
    rating-scale: gradient from red (1) through yellow (5) to green (10)
  breakpoints:
    mobile: < 768px
    tablet: 768px - 1279px
    desktop: ">= 1280px"
templates:
  app_shell:
    purpose: Main application shell with a full-height left sidebar and a content area
    regions:
      - id: sidebar
        type: static
        position: left
        purpose: Navigation sidebar with logo/wordmark at the top. Full-height on desktop, collapsible to a compact icon-only rail, hidden behind a hamburger button on mobile.
        blocks:
          - id: logo
            purpose: Komparator logo/wordmark pinned at the top of the sidebar.
            type: logo
          - id: main_nav
            purpose: Primary navigation links with icons. In collapsed desktop state only icons remain visible.
            type: main_navigation
          - id: welcome_overlay
            purpose: "First-run onboarding overlay shown only once on the first launch. Styled in the same visual language as the experiments empty state. Explains what Komparator is and how the workflow works in 4 short steps. Primary action opens the existing `New experiment` modal immediately, secondary action opens `Models`, tertiary action dismisses the overlay."
            type: onboarding_overlay
        fullHeight: true
      - id: main
        type: content
        position: center
default_template: app_shell
navigation:
  items:
    - id: nav_experiments
      label: Experiments
      target: experiments_list
    - id: nav_models
      label: Models
      target: models_list
    - id: nav_wrappers
      label: Wrappers
      target: wrappers_list
    - id: nav_stats
      label: Stats
      target: stats_dashboard
    - id: nav_settings
      label: Settings
      target: settings_page
screen_groups:
  - id: experiments
    screens:
      - experiments_list
      - experiment_detail
  - id: reference_data
    screens:
      - models_list
      - model_form
      - wrappers_list
      - wrapper_form
  - id: analytics
    screens:
      - stats_dashboard
  - id: app_settings
    screens:
      - settings_page
screens:
  experiments_list:
    blocks:
      - id: list_header
        purpose: "Compact toolbar row: page title 'Experiments' with count of matching items, view mode segmented control (All | By category), title-only search input, sort dropdown, 'Categories' button for inline category management, and 'New experiment' primary button. The new-experiment action opens a lightweight create-only modal; there is no separate edit-experiment screen because experiment and prompt changes are handled inside 'Prompt & settings' on experiment_detail."
        columns: 12
      - id: create_experiment_modal
        purpose: "Lightweight create-only modal focused on the first useful action. By default it shows only the required fields: `Title` and `Prompt text`. Secondary metadata is intentionally hidden from the first step. A small `Advanced settings` disclosure reveals optional `Description`, `Category`, and `Wrapper version`. Wrapper selection is not a plain dropdown: it opens a dedicated modal picker where the user can first choose a wrapper family and then a concrete immutable version (for example `Standard HTML v3`, `Standard HTML v2`, `Tailwind CDN v1`) so the user explicitly chooses which wrapper_version becomes part of the initial experiment_version. `Change note` is not part of the first create flow and starts empty for the initial prompt version."
        columns: 12
      - id: wrapper_version_picker
        purpose: "Shared modal picker used wherever the user needs to choose a wrapper_version. It is two-step inside one modal: first the user sees a searchable list of wrapper families plus an explicit `No wrapper` option; after clicking a wrapper, the modal switches to that wrapper's immutable version list with a back action to families. Version rows stay compact and show version label plus `change_note` preview instead of template text, because template bodies may be very long. Used from experiment create-flow and from Prompt & settings when editing or drafting an experiment version."
        columns: 12
      - id: categories_manager
        purpose: "Modal opened from the toolbar on the experiments page. Lists categories with color, description and experiment count. Supports create, rename, recolor and delete. Delete is disabled when the category is still used by experiments."
        columns: 12
      - id: experiments_grid
        purpose: "Content area with two modes. 'All' mode shows one responsive grid of experiment cards. 'By category' mode shows category sections with colored headers and per-category responsive grids. Results are loaded incrementally in pages and a bottom 'Load more' control appends the next batch. Search and sort reset the list to the first page. If there are no experiments yet, the content area switches to a dedicated onboarding empty state with a short explanation of what experiments are, how the workflow works, and a primary action to create the first experiment. If a search returns no matches, the grid shows a compact empty-search state instead."
        columns: 12
        blocks:
          - id: experiment_card
            purpose: "Repeated card per experiment. Shows: title (bold, clickable → experiment_detail), description (2 lines truncated), category badge (colored dot + name), stats row (number of experiment versions, number of results, avg rating as colored number). If the experiment already has results, the card may also show a compact mini-preview of the top result (best rating, with latest result as fallback) together with provider/model label and rating. The card preview is lazy: list data contains only preview metadata, while the actual HTML is fetched and the iframe is mounted only when the card approaches the viewport; before that a lightweight placeholder is shown. Bottom: created date and last updated relative time. Hover: subtle elevation. Click anywhere → experiment_detail."
    title: Experiments
    purpose: Main screen. Browse experiments either as one list or grouped into category sections, with incremental pagination and lazy card previews to keep the landing page responsive for large local datasets.
  experiment_detail:
    blocks:
      - id: experiment_topbar
        purpose: "Compact informational header above the main workspace block: experiment title and category badge live here as primary metadata. Title is editable inline directly in the header. Category is shown as a badge in read mode and becomes an inline dropdown when the user clicks it. Description stays as contextual text below. This row sits outside the bordered results/settings container and replaces the need for a separate experiment-settings side panel."
        columns: 12
      - id: experiment_tabs
        purpose: "Tab bar with two tabs: 'Results' (shows count badge with number of results) and 'Prompt & settings'. Results tab active by default. Right side of tab bar (visible only on Results tab): view mode toggle (Single | Side by side), result-scope selector with concrete versions plus `All versions`, and '+ Add result' primary button. When `All versions` is selected, the results list becomes grouped by experiment version and the add-result action is disabled until the user picks a concrete version. The concrete version chosen in this result-scope selector is the exact target for Add result and stays independent from the version currently selected in Prompt & settings."
        columns: 12
      - id: add_result_modal
        purpose: "Modal flow for attaching a result to the experiment version currently selected by the Results-tab result-scope selector. The content is organized as three explicit steps on one screen. Step 1: compact prompt block with experiment version, wrapper version, copy action and final clipboard prompt preview. The copied prompt always includes a built-in instruction to return exactly one HTML page and no explanation outside it; external assets and CDNs are allowed; generated HTML must not rely on `localStorage`, `sessionStorage` or other browser persistence because results are previewed inside sandboxed iframes. Wrapper is optional and, when present, wraps that final prompt. The exact composed prompt for this launch is snapshotted into result metadata. Step 2: chosen model summary with a 'Choose model' action opening a dedicated chooser modal. Step 3: large HTML output textarea. Optional notes stay collapsed by default below the HTML field. Rating is not collected at this stage; it is set later while reviewing the rendered result."
        columns: 12
      - id: add_result_model_manager
        purpose: "Shared model picker modal used both from Add result and from Edit result when the user changes the model attached to an existing saved result. Left side: model browser with tabs (`Popular`, `Catalog`, `My models`), search by model/provider text, provider filter dropdown and sort toggle (`Recent` / `Name`). `Recent` sorts local models by last usage across the app so the most recently used models appear first. User can choose an existing local model, add one from the remote catalog, or bulk-load the `popular` preset. Local model rows also expose quick actions for edit and duplicate without leaving the modal. Right side: shared model editor used for create, edit and duplicate flows (existing or new provider, model name, version, comment, active state). Newly created or updated model becomes immediately selectable for the current add/edit-result flow."
        columns: 12
      - id: results_tab
        purpose: "Main workspace tab. Fills the remaining viewport height as a fixed workspace. Master-detail layout: narrow list on left, large preview on right. The page itself should not grow with long result content; scrolling happens inside the results list panel and inside the preview/code panels."
        columns: 12
        blocks:
          - id: results_list
            purpose: "Left panel: scrollable list of results for the currently selected result scope. In normal mode the scope is one concrete experiment version; in `All versions` mode the same list is grouped into version sections (`v3`, `v2`, `v1`, ...). Each item shows: provider color dot, model name (bold, allowed to wrap onto multiple lines when long), version + comment on second line (muted), rating number (colored by rating-scale palette), attempt badge (if >1). Each row also has a compact overflow action button opening a menu with 'Edit' and 'Delete'. Edit opens a modal for changing the saved HTML output, notes, the model attached to that result via the same shared model picker used in Add result, and the concrete experiment version linked to that saved result. The edit modal must show the current linked version and allow moving the result to another version of the same experiment. Delete opens a confirmation modal. Selected item highlighted with left border accent. Click selects result for preview. In side-by-side mode: click assigns to slot A or B (visually marked with A/B labels and distinct left-border colors). Sort control at top is functional and supports rating / model / date. If the current scope has no results yet, the panel shows a compact empty state instead of an empty list. If the list exceeds the available height, the panel itself scrolls."
            columns:
              default: 3
              mobile: 12
              tablet: 4
          - id: results_preview_single
            purpose: "Right panel: full preview of selected result. Single compact header combines provider dot + full model name (provider / name / version), compact rating control, comment, file size and line count. The same header also contains local preview controls: device width switcher with user-facing labels 'Mobile' / 'Tablet' / 'Desktop' (internally 375px / 768px / 100%), 'Fullscreen', and a compact overflow menu '...' with 'Code', 'Notes' and 'Prompt snapshot'. 'Fullscreen' opens an overlay with the same current preview state (single or compare, current device width, current code mode) and closes via close button or Escape. In single-result fullscreen mode, fast result switching is available directly in the header via previous/next controls next to the model title, plus a compact attempt badge. Main area: sandboxed iframe (srcdoc) rendering the HTML result, takes all available height. Browser persistence APIs such as `localStorage` and `sessionStorage` are not guaranteed inside this preview and must not be relied on by generated results. Code mode uses syntax highlighting for HTML, including CSS inside <style> blocks and JavaScript inside <script> blocks. If there are no results for the selected experiment version, the preview area is replaced by a dedicated empty state with 'Copy prompt' and '+ Add result' actions. If rendered HTML or code exceeds the available height, scrolling stays inside the preview area."
            columns:
              default: 9
              mobile: 12
              tablet: 8
          - id: results_preview_sbs
            purpose: "Right panel splits into two resizable sub-panels (A and B), separated by a draggable divider. Each sub-panel has a compact header with provider dot, model name, attempt metadata and rating. Below: sandboxed iframe rendering HTML or code view depending on the shared compare-mode state. Browser persistence APIs such as `localStorage` and `sessionStorage` are not guaranteed inside this preview and must not be relied on by generated results. Code view uses syntax highlighting for HTML, including CSS inside <style> blocks and JavaScript inside <script> blocks. Both panels share the same device width simulator (synced) with user-facing labels 'Mobile' / 'Tablet' / 'Desktop'. Selecting results from the list assigns them to A (first click) then B (second click). Click again on a listed item to swap it into the most recently active slot. Each sub-panel keeps its own internal scroll when content exceeds the available height."
            columns:
              default: 9
              mobile: 12
              tablet: 8
      - id: prompt_settings_tab
        purpose: Secondary tab (hidden by default). Contains experiment-version management only. Rarely accessed — user comes here to inspect the current version or create a new one, then returns to Results.
        columns: 12
        blocks:
          - id: prompt_versions
            purpose: "Left-side version history list for the current experiment, matching the wrappers screen pattern instead of horizontal pills. Each row shows version label (v1, v2, ...), created date, change_note preview, selected state, and result count for that experiment_version. Active version highlighted. Each version is immutable after creation and represents one complete set of input conditions. Switching between versions only changes the read-only view; it never creates or updates a version in the background. Versions with no linked results may expose a delete action, but deletion is blocked when results exist and the last remaining experiment_version cannot be removed."
            columns: 12
          - id: prompt_editor
            purpose: "Selected version is shown in an audit-friendly editor. If the selected experiment_version has no linked results yet, its prompt text and wrapper_version may still be edited in place and saved without creating a new version. Once at least one result is linked, prompt text and wrapper_version become read-only and further condition changes require explicit `+ New version` flow. `change_note` remains editable for any version because it is descriptive metadata rather than an input condition. Wrapper choice inside a draft or editable zero-result version must go through the shared wrapper-version picker modal and must resolve to a concrete immutable wrapper_version, not just a wrapper family or latest alias. Very long prompt text must not stretch the whole screen: the prompt editor uses a bounded-height code-style panel with internal scrolling for both line numbers and content so surrounding controls and previews remain visible, and the save/create actions stay pinned in a persistent bottom action row instead of disappearing below the fold."
            columns: 12
          - id: experiment_version_delete_confirm
            purpose: "Confirmation modal opened when the user tries to delete an experiment_version from the left version list. Explains that only versions with no linked results may be deleted and that the last remaining version of the experiment cannot be removed. Replaces browser-native confirm dialogs."
            columns: 12
    title: Experiment Detail
    purpose: "Central workspace for one experiment. Two tabs: Results (default, primary workspace) and Prompt & settings (rare editing). Results tab has list+preview layout with single/side-by-side modes."
  models_list:
    blocks:
      - id: models_header
        purpose: "Top navigation header for the Models section. Shows page title and a two-tab switcher: 'My models' (default) and 'Catalog'. This header is visually lighter than content cards and reads as section navigation, not as another data block."
        columns: 12
      - id: models_mine_toolbar
        purpose: "Visible only on the 'My models' tab. Compact toolbar row with search input, `Manage providers` action and `Add model` primary button. Provider creation and editing are intentionally not inline in the filter area."
        columns: 12
      - id: providers_manager
        purpose: "Modal opened from `Manage providers`. Lists providers with color, active state and model count. Supports create and edit without cluttering the main filters area on the models screen."
        columns: 12
      - id: models_duplicates
        purpose: "Visible only on the 'My models' tab when needed. Compact warning block listing possible duplicate matches between local models and catalog models, with actions to link or keep separate."
        columns: 12
      - id: models_table
        purpose: "Visible only on the 'My models' tab. Single bordered panel that contains the local model list and its filters in one place. Top area inside the same panel: source chips (`All sources`, `My models`, `Catalog-linked`, `Needs review`) and compact provider filter chips only. Below: table of local models. Columns: provider (color dot + name), model name, version/comment, results count, avg rating, source, active toggle. Row actions: delete, edit, duplicate. Sortable by visible columns. The panel fills the remaining page height and the rows area scrolls internally so the page header, toolbar and filters remain in place."
        columns: 12
      - id: model_delete_confirm
        purpose: "Confirmation modal opened from a local-model row action. Replaces browser-native confirm. Shows model name, provider and linked result count. If the model is still used by saved results, deletion is rejected and the user must first reassign or remove those results."
        columns: 12
      - id: catalog_overview
        purpose: "Visible only on the 'Catalog' tab. Header row with 'Update catalog' and 'Import JSON' actions, plus compact summary stats: catalog version, number of providers, number of catalog models, number of presets, and pending duplicate-review count."
        columns: 12
      - id: catalog_models_list
        purpose: "Visible only on the 'Catalog' tab. Left-side card showing the models currently included in the `popular` catalog list. The card header includes a compact count badge (for example `20 models`). The list has a fixed max height and scrolls internally instead of extending below the viewport. Each row shows provider color dot, model name, local-status hint (`already added` / `possible duplicate`) and an add action."
        columns:
          default: 7
          mobile: 12
      - id: catalog_presets
        purpose: "Visible only on the 'Catalog' tab. Right-side card listing catalog presets. Each preset shows title, description, model count, optional delta badge after catalog update, and a `Load` action that imports those models into the local list."
        columns: 12
    title: Models
    purpose: "Manage two related but distinct layers: the user's local working model list and the updatable external catalog."
  model_form:
    blocks:
      - id: model_form_content
        purpose: "Form fields for local models only: provider (select from existing or create new inline with color picker), model name, version, comment (placeholder hints: 'thinking high, temp 0.7, etc.'), is_active toggle. Catalog models are not edited here directly; they are added into the local list first and then can be edited as local entries."
        columns: 12
      - id: model_form_footer
        purpose: Cancel and Save buttons.
        columns: 12
    title: New / Edit Model
    purpose: Modal dialog for creating or editing a model configuration.
  wrappers_list:
    blocks:
      - id: wrappers_header
        purpose: "Page title 'Wrappers' with count of wrappers and 'Add wrapper' primary button. Both the primary action and clicking a wrapper card navigate to the dedicated wrapper editor screen; inline modal editing is not used."
        columns: 12
      - id: wrappers_grid
        purpose: "Grid of wrapper cards. Each card shows: name (bold), 'default' badge if is_default, latest-version badge (for example `v3`), template text preview from the latest version (first 3 lines, monospace, surface-code background), usage count (how many experiment versions use any version of this wrapper), and updated date. Click opens the dedicated wrapper screen. Card-level quick actions are limited to safe wrapper-level actions such as set default and delete; version editing does not happen inside the card. If there are no wrappers yet, the grid area switches to a styled onboarding empty state that explains what wrappers are, how {{prompt}} works, and how wrapper versions are attached to experiment versions before comparison."
        columns: 12
      - id: wrapper_delete_confirm
        purpose: "Confirmation modal opened from a wrapper card delete action. Explains that deleting a wrapper removes the wrapper record and all of its versions, and that the action is blocked if any experiment_version still references one of those wrapper_version records."
        columns: 12
    title: Wrappers
    purpose: Manage prompt wrapper templates.
  wrapper_form:
    blocks:
      - id: wrapper_header
        purpose: "Top row for the dedicated wrapper screen. Shows back action to Wrappers list plus wrapper-level metadata inline: wrapper name is editable directly in the header, and the default toggle/badge sits on the same line next to the name. Heavy status copy such as latest-version summary is intentionally omitted. Primary action is `New version`, which starts an explicit draft flow from the currently selected version. Deleting or changing default status is handled here as wrapper-level metadata, not as version creation. In create-mode this same screen is used to define wrapper metadata and explicitly publish the first version `v1`."
        columns: 12
      - id: wrapper_versions_list
        purpose: "Left panel with the full version history for the current wrapper. Each row shows version label (v1, v2, ...), created date, change_note preview, and usage count (how many experiment versions reference this wrapper_version). User can switch between versions explicitly. Existing versions are immutable and open in read-only mode by default. Unused versions may also expose a delete action, but only when no experiment_version references them and the wrapper still keeps at least one remaining version after deletion."
        columns:
          default: 3
          mobile: 12
      - id: wrapper_version_view
        purpose: "Main read-only version inspector for the selected wrapper version. Shows version number, created date, full change_note, template body in monospace block, and final composed prompt preview with sample prompt applied. This mode is for auditability and safe switching between versions without accidentally creating a new one."
        columns:
          default: 5
          mobile: 12
      - id: wrapper_version_draft
        purpose: "Editor panel shown only when the user explicitly starts `New version`. The draft is initialized from the selected version, then the user changes template and next-version change_note. Typing in this draft does not create or persist a wrapper_version automatically. The draft must contain {{prompt}} and is published only by explicit `Create version` / `Publish version` action."
        columns:
          default: 4
          mobile: 12
      - id: wrapper_preview
        purpose: "Minimal live composed-prompt preview for the currently selected read-only version or the current draft, depending on mode. Uses a restrained neutral surface instead of a decorative sandbox treatment. Shows an editable sample prompt, compact char count, and the final composed prompt with {{prompt}} substituted. Rendered in monospace, surface-code background."
        columns:
          default: 12
          mobile: 12
      - id: wrapper_publish_bar
        purpose: "Sticky action row visible only in draft mode. Contains `Discard draft` and `Create version` actions plus validation and status hints. New immutable wrapper_version is created only from this bar, never from background autosave or from switching fields."
        columns: 12
      - id: wrapper_delete_confirm
        purpose: "Confirmation modal opened from the wrapper header delete action. Explains that deleting the wrapper removes all of its versions and is blocked if any experiment_version still references one of those versions."
        columns: 12
      - id: wrapper_version_delete_confirm
        purpose: "Confirmation modal opened when the user deletes an unused wrapper_version from the version history list. Makes clear that only unused versions can be removed and that at least one wrapper_version must remain."
        columns: 12
    title: New / Edit Wrapper
    purpose: "Dedicated wrapper management screen. Supports browsing immutable wrapper versions, switching between them, and creating a new version through an explicit draft-and-publish flow. This is a full screen, not a modal."
  stats_dashboard:
    blocks:
      - id: stats_summary
        purpose: "Top row of metric cards: total experiments, total results, total models used, average rating across all results. This block should open quickly from local precomputed aggregates instead of recalculating the full workspace on every visit."
        columns: 12
      - id: model_leaderboard
        purpose: "Leaderboard table: models ranked by average rating. Columns: rank, provider color dot + model name + version, avg rating (colored), number of results rated, win rate (% of times this model had highest rating in an experiment). Backed by local aggregate metrics so it does not require a full raw-results scan on every load."
        columns:
          default: 6
          mobile: 12
      - id: provider_breakdown
        purpose: "Bar chart or horizontal stacked bars: rating distribution per provider. X-axis: providers. Y-axis: average rating. Color-coded by provider palette. Shows how many results each provider has. Uses local aggregate metrics for fast initial render."
        columns:
          default: 6
          mobile: 12
      - id: category_stats
        purpose: "Table: categories with avg rating per model. Rows: categories. Columns: each active model. Cells: avg rating (colored). Shows which model excels in which category of tasks. This block may be computed separately from raw rated results after the fast aggregate-backed summary loads."
        columns:
          default: 6
          mobile: 12
      - id: rating_history
        purpose: "Line chart: average rating over time per model. X-axis: date (result created_at by day). Y-axis: rating 1-10. One line per model (colored by provider). Shows trends — which models are improving/degrading over time. This block may be computed separately from raw rated results after the fast aggregate-backed summary loads."
        columns:
          default: 6
          mobile: 12
    title: Stats
    purpose: "Aggregated statistics across all experiments, models, and ratings. The screen uses a hybrid loading model: top-level summary, leaderboard, and provider breakdown come from local precomputed aggregates, while category matrix and rating history may still be derived from raw rated results."
  settings_page:
    blocks:
      - id: backup_export
        purpose: "Backup section with explanation and a primary action for exporting the full local database as a ZIP file."
        columns:
          default: 6
          mobile: 12
      - id: backup_import
        purpose: "Restore section with explanation and a button for selecting a ZIP backup file. Confirmation happens in a modal before replacing the local database."
        columns:
          default: 6
          mobile: 12
    title: Settings
    purpose: Application settings page. Currently used for local backup import/export instead of a global top bar.

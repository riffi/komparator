docType: data-spec
format_version: 0.0.1
metadata:
  name: Komparator
  version: 0.5.0
  author: ""
  created_at: 2026-03-23
  updated_at: 2026-03-23
  description_short: Side-by-side comparison tool for LLM-generated HTML outputs
description: |
  Komparator — инструмент для сравнения результатов работы разных LLM-моделей
  на одних и тех же промптах.

  Флоу: пользователь создаёт эксперимент с промптом, копирует его в разные
  LLM вместе с системной инструкцией вернуть один HTML-документ
  без пояснений вне него,
  при необходимости дополнительно обернув через wrapper, получает
  HTML-результаты, вставляет обратно и сравнивает side-by-side визуально.

  Ключевые возможности:
  - Управление экспериментами с версионностью промптов
  - Настраиваемые оверлей-обёртки (wrapper) для стандартизации условий
  - Хранение и рендер HTML-результатов от разных моделей
  - Постраничная загрузка списка экспериментов с ленивыми card preview
  - Локальные предвычисленные агрегаты для быстрого stats dashboard
  - Детальное описание моделей (провайдер, версия, режим thinking)
  - Side-by-side визуальное сравнение с рейтингом по 10-балльной шкале
  - Категоризация и тегирование экспериментов
  - Экспорт/импорт всех данных (ZIP с JSON внутри)
  - Welcome/onboarding экран при первом входе
  - Упрощённый стартовый create-flow для первого эксперимента

  Стек: SPA на Vercel, Dexie (IndexedDB), без бэкенда.
entities:
  category:
    label: Категория
    description: Тематическая группировка экспериментов (landing page, dashboard, game и т.д.)
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      name:
        type: string
        required: true
        unique: true
        label: Название
        description: "Например: landing page, dashboard, game, form, animation"
      description:
        type: string
        label: Описание
      color:
        type: string
        label: Цвет
        description: HEX-цвет для визуального различения в UI
      sort_order:
        type: integer
        default: 0
        label: Порядок сортировки
      created_at:
        type: datetime
        required: true
        default: now
  wrapper:
    label: Обёртка
    description: |
      Именованное семейство шаблонов-инструкций, используемое для стандартизации
      условий эксперимента. Сама запись wrapper не используется напрямую при
      копировании prompt в LLM: для запуска всегда берётся конкретная
      immutable-версия wrapper_version.
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      name:
        type: string
        required: true
        label: Название
        description: "Например: Standard HTML, Tailwind CDN, Dark Theme Only"
      is_default:
        type: boolean
        default: false
        label: По умолчанию
        description: Используется как обёртка по умолчанию для новых экспериментов
      created_at:
        type: datetime
        required: true
        default: now
      updated_at:
        type: datetime
        required: true
        default: now
  wrapper_version:
    label: Версия обёртки
    description: |
      Immutable-версия wrapper. Содержит конкретный template с плейсхолдером
      {{prompt}} и может быть выбрана в experiment_version как часть входных
      условий эксперимента.
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      wrapper_id:
        type: uuid
        required: true
        fk: wrapper.id
        label: Обёртка
      version_number:
        type: integer
        required: true
        label: Номер версии
        description: Автоинкремент внутри wrapper (1, 2, 3...)
      template:
        type: string
        required: true
        label: Шаблон
        description: |
          Текст обёртки с плейсхолдером {{prompt}}.
          Пример: "Return one HTML document and no explanation outside it.
          External libraries and CDNs are allowed when useful.\n\nTask:\n{{prompt}}"
      change_note:
        type: string
        label: Заметка об изменении
        description: Что изменилось по сравнению с предыдущей версией wrapper
      created_at:
        type: datetime
        required: true
        default: now
    unique_constraints:
      - - wrapper_id
        - version_number
  experiment:
    label: Эксперимент
    description: |
      Центральная сущность-контейнер. Хранит только метаданные и объединяет
      experiment_version, результаты от разных моделей и пользовательскую
      организацию данных.
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      title:
        type: string
        required: true
        label: Название
        description: Краткое название эксперимента. Используется для пользовательского поиска и A-Z сортировки в списке экспериментов.
      description:
        type: string
        label: Описание
        description: Подробное описание цели и ожиданий
      category_id:
        type: uuid
        fk: category.id
        label: Категория
        description: |
          Опциональная категория эксперимента. Может быть null, если эксперимент
          ещё не отнесён к конкретной группе.
      tags:
        type: json
        label: Теги
        description: Массив строк-тегов для гибкой фильтрации, например ['responsive', 'animation', 'complex']
      created_at:
        type: datetime
        required: true
        default: now
      updated_at:
        type: datetime
        required: true
        default: now
  experiment_version:
    label: Версия эксперимента
    description: |
      Версия входных условий эксперимента. Объединяет текст промпта,
      выбранную wrapper_version и change_note. Пока к версии не привязан
      ни один result, `prompt_text` и `wrapper_version_id` ещё могут быть
      отредактированы in-place без смены `version_number`. После появления
      первого result эти поля становятся immutable, и дальнейшее изменение
      входных условий требует создания новой experiment_version. Поле
      `change_note` остаётся редактируемым всегда как описательная метадата.
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      experiment_id:
        type: uuid
        required: true
        fk: experiment.id
        label: Эксперимент
      version_number:
        type: integer
        required: true
        label: Номер версии
        description: Автоинкремент внутри эксперимента (1, 2, 3...)
      prompt_text:
        type: string
        required: true
        label: Текст промпта
        description: Чистый пользовательский prompt без wrapper
      wrapper_version_id:
        type: uuid
        fk: wrapper_version.id
        label: Версия обёртки
        description: |
          Опциональная wrapper_version, входящая в состав этой версии
          эксперимента. Если null, итоговый prompt строится только из
          системной HTML-инструкции и prompt_text.
      change_note:
        type: string
        label: Заметка об изменении
        description: Что изменилось по сравнению с предыдущей версией. Для самой первой версии эксперимента обычно остаётся пустой и не требуется в initial create-flow.
      created_at:
        type: datetime
        required: true
        default: now
    unique_constraints:
      - - experiment_id
        - version_number
  provider:
    label: Провайдер
    description: Компания-разработчик LLM (OpenAI, Anthropic, Google и т.д.)
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      name:
        type: string
        required: true
        unique: true
        label: Название
        description: "Например: OpenAI, Anthropic, Google, Meta, xAI, Mistral"
      color:
        type: string
        label: Цвет
        description: HEX-цвет бренда провайдера для UI
      is_active:
        type: boolean
        default: true
        label: Активен
        description: Показывать ли провайдера в списке выбора
      created_at:
        type: datetime
        required: true
        default: now
  llm_model:
    label: LLM-модель
    description: |
      Локальная рабочая запись модели, используемая в эксперименте.
      Это именно пользовательский список моделей, а не внешний каталог.
      Запись может быть создана вручную или добавлена из remote catalog.
      Одна и та же модель с разными настройками thinking — это разные записи.
      Запись можно редактировать, дублировать и удалять, но удаление запрещено,
      если на модель уже ссылаются сохранённые result.
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      provider_id:
        type: uuid
        required: true
        fk: provider.id
        label: Провайдер
      name:
        type: string
        required: true
        label: Название модели
        description: "Базовое имя модели. Например: Claude Opus, GPT, Gemini Pro"
      version:
        type: string
        required: true
        label: Версия модели
        description: "Конкретная версия/релиз. Например: 4o, 4.5, 2.5, 3.5 Sonnet"
      comment:
        type: string
        label: Комментарий
        description: |
          Свободное описание конфигурации: режим thinking (on/off),
          уровень thinking (low/medium/high), температура,
          особые настройки. Например: "thinking high", "no thinking, temp 0.7"
      is_active:
        type: boolean
        default: true
        label: Активна
        description: Показывать ли модель в списке выбора
      source_type:
        type: string
        required: true
        label: Источник
        description: "`manual` для созданной пользователем записи или `catalog` для записи, добавленной из внешнего каталога"
      catalog_model_id:
        type: string
        label: Связь с каталогом
        description: Идентификатор catalog_model, если локальная запись была связана с внешним каталогом
      created_at:
        type: datetime
        required: true
        default: now
      last_used_at:
        type: datetime
        label: Последнее использование
        description: Используется для сортировки recent в выборе модели
    unique_constraints:
      - - provider_id
        - name
        - version
        - comment
  catalog_state:
    label: Состояние каталога
    description: |
      Служебная запись состояния внешнего каталога моделей.
      Хранит текущую импортированную версию, прошлую версию и diff по пресетам.
    fields:
      id:
        type: string
        pk: true
      version:
        type: string
        required: true
      source_label:
        type: string
      imported_at:
        type: datetime
        required: true
      previous_version:
        type: string
      preset_diffs:
        type: json
        description: Массив изменений размера пресетов после последнего обновления каталога
  catalog_provider:
    label: Провайдер каталога
    description: Канонический provider из внешнего JSON-каталога.
    fields:
      id:
        type: string
        pk: true
      canonical_slug:
        type: string
        required: true
      name:
        type: string
        required: true
      color:
        type: string
      is_active:
        type: boolean
        default: true
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true
  catalog_model:
    label: Модель каталога
    description: |
      Каноническая модель из внешнего remote catalog.
      Не используется напрямую в result, а сначала добавляется в локальный llm_model.
    fields:
      id:
        type: string
        pk: true
      provider_catalog_id:
        type: string
        required: true
        fk: catalog_provider.id
      name:
        type: string
        required: true
      version:
        type: string
        required: true
      display_name:
        type: string
        required: true
      aliases:
        type: json
        description: Массив альтернативных названий для дедупликации и поиска
      status:
        type: string
        description: "`active` или `deprecated`"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true
  catalog_preset:
    label: Пресет каталога
    description: |
      Именованный набор моделей из каталога, например `popular` или `big-three`.
      Используется для быстрого добавления моделей в локальный список.
    fields:
      id:
        type: string
        pk: true
      title:
        type: string
        required: true
      description:
        type: string
      model_ids:
        type: json
        description: Список идентификаторов catalog_model
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true
  model_match:
    label: Кандидат на совпадение
    description: |
      Потенциальное совпадение между catalog_model и локальным llm_model.
      Используется для review flow и предотвращения дублей.
    fields:
      id:
        type: string
        pk: true
      catalog_model_id:
        type: string
        required: true
        fk: catalog_model.id
      local_model_id:
        type: string
        required: true
        fk: llm_model.id
      match_type:
        type: string
        description: "`exact`, `alias` или `normalized`"
      confidence:
        type: number
      status:
        type: string
        description: "`pending`, `linked` или `ignored`"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true
  result:
    label: Результат
    description: |
      HTML-код, полученный от LLM-модели в ответ на промпт.
      Привязан к конкретной версии эксперимента и конкретной модели.
      Поддерживает несколько попыток (attempt) для одной и той же
      комбинации версия эксперимента + модель — для сравнения стабильности генерации.
      Содержит рейтинг (голосование) от пользователя.
      При редактировании результат может быть перепривязан к другой локальной модели;
      в этом случае attempt пересчитывается внутри новой пары experiment_version + llm_model,
      а агрегаты stats пересобираются.
    fields:
      id:
        type: uuid
        pk: true
        default: uuid_generate_v4()
      experiment_version_id:
        type: uuid
        required: true
        fk: experiment_version.id
        label: Версия эксперимента
      llm_model_id:
        type: uuid
        required: true
        fk: llm_model.id
        label: Модель
      attempt:
        type: integer
        required: true
        default: 1
        label: Попытка
        description: Номер попытки генерации (1, 2, 3...). Автоинкремент внутри пары версия эксперимента + модель
      composed_prompt_snapshot:
        type: string
        required: true
        label: Снимок итогового prompt
        description: |
          Полный prompt, который реально был скопирован в LLM при создании
          результата: системная HTML-инструкция + prompt_text + wrapper_version,
          если она была выбрана.
      prompt_text_snapshot:
        type: string
        required: true
        label: Снимок prompt_text
        description: Текст prompt из experiment_version на момент запуска
      wrapper_version_id:
        type: uuid
        fk: wrapper_version.id
        label: Версия обёртки
        description: wrapper_version, реально использованная при создании результата. Может быть null.
      wrapper_name_snapshot:
        type: string
        label: Снимок названия обёртки
        description: Название wrapper на момент запуска. Null если wrapper не использовалась.
      wrapper_template_snapshot:
        type: string
        label: Снимок шаблона обёртки
        description: Конкретный template wrapper_version на момент запуска. Null если wrapper не использовалась.
      html_content:
        type: string
        required: true
        label: HTML-код
        description: Полный HTML-код, полученный от модели. На detail-экране отдается целиком, но в experiments list не входит в базовую page-проекцию и запрашивается отдельно только для lazy mini-preview.
      rating:
        type: integer
        label: Рейтинг
        description: Оценка пользователя по 10-балльной шкале (1-10). Null если ещё не оценено
      notes:
        type: string
        label: Заметки
        description: Свободные заметки к результату (что понравилось, что нет, баги)
      file_size_bytes:
        type: integer
        label: Размер файла
        description: Размер HTML в байтах (вычисляется автоматически)
      line_count:
        type: integer
        label: Количество строк
        description: Число строк в HTML (вычисляется автоматически)
      created_at:
        type: datetime
        required: true
        default: now
    unique_constraints:
      - - experiment_version_id
        - llm_model_id
        - attempt
  stats_workspace:
    label: Сводка workspace analytics
    description: |
      Единичная агрегированная запись для верхнего ряда карточек в Stats.
      Обновляется при изменении результатов и хранит только счётчики и суммы.
    fields:
      id:
        type: string
        pk: true
        description: Фиксированное значение `workspace`
      experiments_count:
        type: integer
      experiment_versions_count:
        type: integer
      results_count:
        type: integer
      rated_results_count:
        type: integer
      used_models_count:
        type: integer
      providers_count:
        type: integer
      rating_sum:
        type: number
      updated_at:
        type: datetime
  stats_model:
    label: Агрегаты по модели
    description: |
      Предвычисленные метрики для leaderboard и summary-представлений.
      Названия модели и провайдера берутся из актуальных записей llm_model/provider при чтении.
    fields:
      model_id:
        type: uuid
        pk: true
        fk: llm_model.id
      results_count:
        type: integer
      rated_count:
        type: integer
      rating_sum:
        type: number
      wins:
        type: integer
      experiments_participated_count:
        type: integer
      updated_at:
        type: datetime
  stats_provider:
    label: Агрегаты по провайдеру
    description: |
      Предвычисленные метрики для provider breakdown.
      Использует текущий provider_id модели; подписи и цвет подтягиваются из provider при чтении.
    fields:
      provider_id:
        type: uuid
        pk: true
        fk: provider.id
      results_count:
        type: integer
      rated_count:
        type: integer
      rating_sum:
        type: number
      updated_at:
        type: datetime
relations:
  - entity_a: category
    entity_b: experiment
    cardinality: one_to_many
    label: groups
    description: Категория группирует множество экспериментов
  - entity_a: wrapper
    entity_b: wrapper_version
    cardinality: one_to_many
    label: has versions
    description: Одна обёртка имеет множество immutable-версий
  - entity_a: experiment
    entity_b: experiment_version
    cardinality: one_to_many
    label: has versions
    description: Эксперимент содержит одну или более версий входных условий
  - entity_a: wrapper_version
    entity_b: experiment_version
    cardinality: one_to_many
    label: used by
    description: Одна версия обёртки может использоваться во многих версиях эксперимента
  - entity_a: provider
    entity_b: llm_model
    cardinality: one_to_many
    label: offers
    description: Провайдер предлагает множество моделей
  - entity_a: experiment_version
    entity_b: result
    cardinality: one_to_many
    label: produces
    description: Версия эксперимента порождает результаты от разных моделей
  - entity_a: llm_model
    entity_b: result
    cardinality: one_to_many
    label: generates
    description: Модель генерирует результаты для разных промптов. Связь обязательна для result и блокирует удаление llm_model, пока на неё существуют ссылки.
indexes:
  experiment:
    - id
    - title
    - category_id
    - created_at
    - updated_at
  wrapper_version:
    - id
    - wrapper_id
    - [wrapper_id, version_number]
    - created_at
  experiment_version:
    - id
    - experiment_id
    - [experiment_id, version_number]
    - wrapper_version_id
  provider:
    - id
    - name
    - is_active
  llm_model:
    - id
    - provider_id
    - [provider_id, name, version, comment]
    - is_active
    - source_type
    - catalog_model_id
    - last_used_at
  catalog_state:
    - id
    - version
    - imported_at
  catalog_provider:
    - id
    - canonical_slug
    - name
    - is_active
  catalog_model:
    - id
    - provider_catalog_id
    - display_name
    - status
  catalog_preset:
    - id
    - title
  model_match:
    - id
    - catalog_model_id
    - local_model_id
    - status
    - [catalog_model_id, local_model_id]
  result:
    - id
    - experiment_version_id
    - llm_model_id
    - wrapper_version_id
    - [experiment_version_id, llm_model_id, attempt]
    - created_at
    - rating
  stats_workspace:
    - id
    - updated_at
  stats_model:
    - model_id
    - updated_at
  stats_provider:
    - provider_id
    - updated_at
read_models:
  experiment_detail:
    description: |
      Read-модель для основного экрана одного эксперимента.
      Возвращает experiment-level metadata, список всех experiment_version
      с данными для version-management UI и список results для выбранного
      рабочего контекста.
    input:
      experiment_id:
        type: uuid
        description: Идентификатор experiment
    output:
      experiment:
        type: object
        fields:
          id: uuid
          title: string
          description: string
          category_id: uuid|null
          category_name: string
          category_color: string
          tags: json
          created_at: datetime
          updated_at: datetime
      versions:
        type: array
        item:
          id: uuid
          version_number: integer
          prompt_text: string
          wrapper_version_id: uuid|null
          wrapper_name: string
          wrapper_version_number: integer|null
          wrapper_template: string
          change_note: string
          created_at: datetime
          result_count: integer
      results:
        type: array
        item:
          id: uuid
          experiment_version_id: uuid
          experiment_version_number: integer
          llm_model_id: uuid
          provider_name: string
          provider_color: string
          model_name: string
          model_version: string
          model_comment: string
          attempt: integer
          rating: number|null
          notes: string
          composed_prompt_snapshot: string
          prompt_text_snapshot: string
          wrapper_version_id: uuid|null
          wrapper_name: string
          wrapper_version_number: integer|null
          wrapper_template_snapshot: string|null
          file_size_bytes: integer
          line_count: integer
          created_at: datetime
  wrapper_detail:
    description: |
      Read-модель для экрана управления одним wrapper.
      Возвращает wrapper-level metadata, полную историю wrapper_version,
      usage по каждой версии и latest/current состояние для явного
      versioning-flow без скрытого создания новых версий.
    input:
      wrapper_id:
        type: uuid
        description: Идентификатор wrapper
    output:
      wrapper:
        type: object
        fields:
          id: uuid
          name: string
          is_default: boolean
          created_at: datetime
          updated_at: datetime
          latest_version_id: uuid
          latest_version_number: integer
          total_usage_count: integer
      versions:
        type: array
        item:
          id: uuid
          version_number: integer
          template: string
          change_note: string
          created_at: datetime
          usage_count: integer
          is_latest: boolean
  experiments_list_page:
    description: |
      Лёгкая page-проекция для landing screen со списком экспериментов.
      Возвращает только один page результатов (`offset`, `limit`) после применения `query` и `sort`.
      Агрегации считаются только для экспериментов текущей страницы, а не для всей базы.
    input:
      query:
        type: string
        description: Подстрока для поиска по experiment.title
      sort:
        type: enum(updated, newest, oldest, title)
        description: Пользовательская сортировка списка
      offset:
        type: integer
        description: Смещение страницы
      limit:
        type: integer
        description: Размер страницы
    output:
      total:
        type: integer
        description: Общее число совпавших экспериментов для текущих query/sort
      items:
        type: array
        item:
          experiment_id: uuid
          title: string
          description: string
          category_id: uuid|null
          category_name: string
          category_color: string
          version_count: integer
          result_count: integer
          avg_rating: number|null
          created_at: datetime
          updated_at: datetime
          top_result_preview:
            type: object|null
            description: |
              Метаданные top result для карточки. Полный html_content здесь не передаётся.
              Нужен для подписи превью и отдельной lazy-загрузки.
            fields:
              result_id: uuid
              rating: number|null
              provider_name: string
              provider_color: string
              model_name: string
              model_version: string
  experiment_card_preview:
    description: |
      Отдельная точечная загрузка html_content для mini-preview на карточке эксперимента.
      Вызывается только когда карточка входит в viewport или приближается к нему.
    input:
      result_id:
        type: uuid
    output:
      html_content:
        type: string|null
  stats_dashboard:
    description: |
      Гибридная read-модель для stats dashboard.
      Summary cards, model leaderboard и provider breakdown читаются
      из локальных aggregate tables. Category matrix и rating history
      могут по-прежнему вычисляться из raw rated results.
    output:
      summary:
        type: array
      leaderboard:
        type: array
      provider_breakdown:
        type: array
      category_matrix:
        type: array
      rating_history:
        type: array
behavior_rules:
  - id: first_run_welcome
    description: При первом запуске приложения показывается onboarding overlay с кратким объяснением сценария и быстрым действием `Create experiment`. После закрытия повторно не показывается по умолчанию.
  - id: initial_experiment_minimal_flow
    description: В initial create-flow обязательны только `experiment.title` и `experiment_version.prompt_text`. `description`, `category_id` и `experiment_version.wrapper_version_id` остаются опциональными и скрыты за advanced settings; `experiment_version.change_note` для первой версии создаётся пустым.
  - id: immutable_experiment_version
    description: "`experiment_version.change_note` может редактироваться всегда. Поля `prompt_text` и `wrapper_version_id` можно редактировать только пока к версии не привязан ни один result; после появления первого result эти поля становятся immutable, и их изменение требует создания новой experiment_version."
  - id: editable_unlaunched_experiment_version
    description: "Пока к experiment_version не привязан ни один result, UI может позволять редактировать `prompt_text`, `wrapper_version_id` и `change_note` без создания новой версии и без смены `version_number`."
  - id: explicit_experiment_version_creation
    description: Новая experiment_version создаётся только по явному пользовательскому действию `Create version`. Изменения draft в UI, переключение между версиями или сохранение experiment-level metadata сами по себе не создают новую запись.
  - id: delete_unused_experiment_version
    description: experiment_version может быть удалена только если к ней не привязан ни один result. Удаление последней оставшейся версии эксперимента запрещено.
  - id: immutable_wrapper_version
    description: После создания wrapper_version её `template` не редактируется. Изменение wrapper создаёт новую wrapper_version внутри того же wrapper.
  - id: explicit_wrapper_version_creation
    description: Новая wrapper_version создаётся только по явному пользовательскому действию `Create version` / `Publish version`. Изменения draft в UI, переключение между версиями или изменение wrapper-level metadata сами по себе не создают новую запись.
  - id: delete_unused_wrapper_version
    description: wrapper_version может быть удалена только если на неё не ссылается ни одна experiment_version. Удаление последней оставшейся версии внутри wrapper запрещено.
  - id: delete_model_guard
    description: Локальная модель может быть удалена только если ни один result не ссылается на неё.
  - id: result_model_reassignment
    description: При смене llm_model_id у существующего result система обязана пересчитать attempt внутри новой пары experiment_version_id + llm_model_id и затем обновить агрегаты stats.
  - id: result_prompt_snapshot
    description: При создании result система обязана сохранить `composed_prompt_snapshot`, `prompt_text_snapshot` и snapshot полей wrapper, чтобы запуск оставался воспроизводимым даже после будущих изменений в wrapper и UI.
  - id: models_screen_scroll
    description: На экране Models локальный список моделей и каталог должны скроллиться внутри своих панелей, а не раздувать всю страницу по высоте.
